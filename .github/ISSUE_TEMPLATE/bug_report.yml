name: Bug report
description: Report a problem with skeino
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or steps that reproduce the issue.
      render: python
    validations:
      required: true
  - type: input
    id: skeino-version
    attributes:
      label: skeino version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.12
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment / relevant versions
      description: OS, langgraph version, checkpointer backend (in-memory / Postgres), etc.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant logs or stack traces.
      render: shell
    validations:
      required: false
