version: 2
updates:
  # Python dependencies (Poetry — pyproject.toml + poetry.lock)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-deps:
        patterns:
          - "*"

  # GitHub Actions used in CI / publish workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
